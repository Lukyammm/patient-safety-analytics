name: Apply boletim footer fix

on:
  push:
    paths:
      - .github/workflows/fix-boletim-footer.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-footer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch first page footer
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('Index.html')
          text = path.read_text(encoding='utf-8')
          old = (
              "    #pagina-cosep {\n"
              "      display: grid;\n"
              "      align-content: start;\n"
              "      overflow: visible;\n"
              "    }\n"
              "\n"
              "    #pagina-cosep .footer-note {\n"
              "      margin-top: 0;\n"
              "    }\n"
          )
          new = (
              "    #pagina-cosep {\n"
              "      display: grid;\n"
              "      align-content: start;\n"
              "      position: relative;\n"
              "      padding-bottom: 24mm;\n"
              "      overflow: visible;\n"
              "    }\n"
              "\n"
              "    #pagina-cosep .footer-note {\n"
              "      position: absolute;\n"
              "      left: 10mm;\n"
              "      right: 10mm;\n"
              "      bottom: 10mm;\n"
              "      margin-top: 0;\n"
              "    }\n"
          )

          changed = False
          if new not in text:
              if old not in text:
                  raise SystemExit('Target CSS block not found')
              text = text.replace(old, new, 1)
              changed = True

          workflow = Path('.github/workflows/fix-boletim-footer.yml')
          if workflow.exists():
              workflow.unlink()
              changed = True

          if changed:
              path.write_text(text, encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Index.html .github/workflows/fix-boletim-footer.yml
          git commit -m "fix: anchor boletim first page footer"
          git push
